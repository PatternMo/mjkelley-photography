  <text x="83" y="478" font-family="'Space Mono', monospace" font-size="23" fill="#8a8d93" letter-spacing="1">mjkelleyphoto.com</text>
  <text x="83" y="515" font-family="'Space Mono', monospace" font-size="23" fill="#8a8d93" letter-spacing="1">mj@mjkelleyphoto.com</text>
  <text x="83" y="552" font-family="'Space Mono', monospace" font-size="23" fill="#8a8d93" letter-spacing="1">415&#183;375&#183;0178</text>
